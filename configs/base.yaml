# Base experiment config — shared defaults for all experiments.
# Experiment files inherit from this via:
#   base_config: ../../configs/base.yaml

experiment_id: base
description: ""
seed: 42

dataset:
  name: test_dataset
  # Output of build_test_dataset.py  (python build_test_dataset.py --output_dir data/test_dataset/)
  path: data/test_dataset/test_dataset.parquet
  max_docs: null         # null = use all documents

chunker:
  type: chunkers.recursive.RecursiveChunker
  max_chunk_chars: 1024
  overlap_chars: 128

embedder:
  type: embedders.qwen.QwenEmbedder
  model_name: Qwen/Qwen3-Embedding-8B
  batch_size: 16

retriever:
  type: retrievers.faiss_retriever.FaissRetriever
  metric: cosine

# generator and reranker are null by default (retrieval-only)
generator: null
reranker: null

evaluation:
  # queries.json produced by build_test_dataset.py
  queries_path: data/test_dataset/queries.json
  k_values: [5, 25, 100]
  rerank: false
  generate: false
  metrics:
    - recall_at_k
    - precision_at_k
    - hit_at_k
    - mrr
    - ndcg_at_k

indexing:
  document_batch_size: 32
  embedding_batch_size: 16
  save_intermediate_every: 500
  # {index_id} is auto-computed from dataset + chunker + embedder.
  # Experiments that share those settings will share this directory.
  output_dir: runs/indexes/{index_id}

logging:
  level: INFO
  log_dir: runs/{experiment_id}/logs
  resource_monitor_interval: 30.0
