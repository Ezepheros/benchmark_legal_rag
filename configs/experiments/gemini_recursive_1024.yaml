# Experiment: Gemini embedding + recursive 1024-char chunking + 1000 docs
base_config: ../../configs/base.yaml

experiment_id: gemini_recursive_1024_1k-docs
description: "Gemini embedder, recursive 1024-char chunks, 1000-doc corpus"

dataset:
  max_docs: 1000

chunker:
  type: chunkers.recursive.RecursiveChunker
  max_chunk_chars: 1024
  overlap_chars: 128

embedder:
  type: embedders.gemini.GeminiEmbedder
  model_name: gemini-embedding-001
  task_type: RETRIEVAL_DOCUMENT
  batch_size: 50
  max_cost_usd: 10.0

evaluation:
  k_values: [3, 5, 10, 20, 50]
  metrics:
    - recall_at_k
    - doc_recall_at_k
    - hit_at_k
    - mrr
    - ndcg_at_k

indexing:
  document_batch_size: 10
  embedding_batch_size: 50
  save_intermediate_every: 50

logging:
  level: DEBUG
