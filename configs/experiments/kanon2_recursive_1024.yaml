# Experiment: Kanon2 (legal-domain) + recursive 1024-char chunking + 1000 docs
base_config: ../../configs/base.yaml

experiment_id: kanon2_recursive_1024_1k
description: "Kanon2 legal embedder, recursive 1024-char chunks, 1000-doc corpus"

dataset:
  max_docs: 1000

chunker:
  type: chunkers.recursive.RecursiveChunker
  max_chunk_chars: 1024
  overlap_chars: 128

embedder:
  type: embedders.kanon2.Kanon2Embedder
  model_name: kanon-2
  batch_size: 64
