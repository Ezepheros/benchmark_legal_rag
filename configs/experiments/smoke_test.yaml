# Smoke test — runs the full pipeline on 50 documents.
# Uses the smallest Qwen model to keep it fast.
base_config: ../../configs/base.yaml

experiment_id: smoke_test
description: "End-to-end pipeline smoke test on 50 docs"

dataset:
  max_docs: 50

chunker:
  type: chunkers.recursive.RecursiveChunker
  max_chunk_chars: 512
  overlap_chars: 64

embedder:
  type: embedders.qwen.QwenEmbedder
  model_name: Qwen/Qwen3-Embedding-0.6B
  device: cuda:0
  batch_size: 16

evaluation:
  k_values: [3, 5, 10]
  metrics:
    - recall_at_k
    - hit_at_k
    - mrr

indexing:
  document_batch_size: 10
  embedding_batch_size: 16
  save_intermediate_every: 50

logging:
  level: DEBUG
  resource_monitor_interval: 0   # disabled for short runs
