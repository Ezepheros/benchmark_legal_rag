# Experiment: IterRetGen with Qwen3-8B + recursive 1024-char chunks + 1000 docs
# Reuses the index built by qwen_recursive_1024_1k (same embedder + chunker + dataset).
base_config: ../../configs/base.yaml

experiment_id: qwen_recursive_1024_iterretgen_1k-docs
description: "IterRetGen: Qwen3-8B embedder, recursive 1024-char chunks, 1000-doc corpus, 3 retrieval iterations"

dataset:
  max_docs: 1000

chunker:
  type: chunkers.recursive.RecursiveChunker
  max_chunk_chars: 1024
  overlap_chars: 128

embedder:
  type: embedders.qwen.QwenEmbedder
  model_name: Qwen/Qwen3-Embedding-8B
  device: cuda:0
  batch_size: 16

generator:
  type: generators.gemini.GeminiGenerator
  model_name: gemini-2.5-flash
  max_output_tokens: 1024

iterretgen:
  max_iterations: 3
  short_answer: false
  intermediate_model_name: gemini-2.5-flash
  intermediate_max_output_tokens: 1024

evaluation:
  k_values: [3, 5, 10, 20, 50]
  metrics:
    - recall_at_k
    - doc_recall_at_k
    - hit_at_k
    - mrr
    - ndcg_at_k

indexing:
  document_batch_size: 10
  embedding_batch_size: 16
  save_intermediate_every: 50

logging:
  level: DEBUG
